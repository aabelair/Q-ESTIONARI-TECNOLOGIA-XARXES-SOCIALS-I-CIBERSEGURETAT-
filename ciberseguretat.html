<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Campionat de l'Internet Social i Ciberseguretat</title>
    <style>
        :root {
            --primary: #2b5c8f;
            --primary-light: #eef5fc;
            --success: #2e7d32;
            --success-light: #e8f5e9;
            --error: #c62828;
            --error-light: #ffebee;
            --dark: #202124;
            --light: #ffffff;
            --gray: #f1f3f4;
            --border: #dadce0;
            --accent: #ff9800;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f4f7f6;
            color: var(--dark);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--light);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-top: 20px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
        }

        header h1 {
            color: var(--primary);
            font-size: 24pt;
            margin-bottom: 5px;
        }

        header p {
            color: #5f6368;
            font-size: 11pt;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quiz-meta {
            display: flex;
            justify-content: space-between;
            background: var(--gray);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 11pt;
        }

        .progress-bar-container {
            width: 100%;
            background-color: var(--gray);
            height: 10px;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-section h2 {
            font-size: 14pt;
            color: var(--dark);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: var(--light);
            border: 2px solid var(--border);
            padding: 15px 20px;
            border-radius: 10px;
            text-align: left;
            font-size: 11pt;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--primary-light);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        /* Feedback Classes */
        .option-btn.correct {
            background-color: var(--success-light) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: var(--error-light) !important;
            border-color: var(--error) !important;
            color: var(--error) !important;
        }

        /* Feedback Modal/Overlay */
        .feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .feedback-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .feedback-card h3 {
            font-size: 22pt;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .feedback-card p.status-msg {
            font-size: 14pt;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .feedback-card .explanation {
            font-size: 11pt;
            color: #5f6368;
            background: var(--gray);
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .feedback-card.success h3 { color: var(--success); }
        .feedback-card.fail h3 { color: var(--error); }

        .visual-response {
            width: 150px;
            height: 150px;
            margin: 0 auto;
        }

        .action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 12pt;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .action-btn:hover {
            background-color: #1a3d63;
        }

        /* Final Results View */
        .results-section {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .results-section h2 {
            font-size: 24pt;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .score-badge {
            font-size: 48pt;
            font-weight: 800;
            color: var(--accent);
            margin: 20px 0;
        }

        .ranking-msg {
            font-size: 14pt;
            font-weight: 600;
            margin-bottom: 30px;
            color: #3c4043;
            padding: 0 20px;
        }

        /* SVG Clapping Animation */
        .clap-svg {
            width: 120px;
            height: 120px;
            animation: clapAnim 0.6s infinite alternate;
        }

        @keyframes clapAnim {
            0% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1.1) rotate(5deg); }
        }

        /* Crying Emoji Style */
        .cry-emoji {
            font-size: 70pt;
            display: block;
            margin: 10px 0;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>

        let currentQuestionIndex = 0;
        let score = 0;

        const questionTextElem = document.getElementById('question-text');
        const optionsContainerElem = document.getElementById('options-container');
        const questionNumberElem = document.getElementById('question-number');
        const scoreCounterElem = document.getElementById('score-counter');
        const progressBarElem = document.getElementById('progress-bar');
        
        const gameViewElem = document.getElementById('game-view');
        const resultsViewElem = document.getElementById('results-view');
        const finalScoreElem = document.getElementById('final-score');
        const rankingMessageElem = document.getElementById('ranking-message');

        const feedbackOverlay = document.getElementById('feedback-overlay');
        const feedbackCard = document.getElementById('feedback-card');
        const feedbackVisual = document.getElementById('feedback-visual');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackStatusText = document.getElementById('feedback-status-text');
        const feedbackExplanation = document.getElementById('feedback-explanation');

        // Imatge d'aplaudiments en SVG natiu per màxima compatibilitat i disseny net
        const applauseSVG = `
            <svg class="clap-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#e8f5e9"/>
                <text x="50" y="45" font-size="30" text-anchor="middle">👏</text>
                <text x="30" y="75" font-size="20" text-anchor="middle">✨</text>
                <text x="70" y="75" font-size="20" text-anchor="middle">✨</text>
                <path d="M 35 60 Q 50 75 65 60" stroke="#2e7d32" stroke-width="4" fill="none" stroke-linecap="round"/>
            </svg>
        `;

        // Emoticono plorant per al cas de fallar
        const cryEmojiHTML = `<span class="cry-emoji">😭</span>`;

        function loadQuestion() {
            if (currentQuestionIndex >= quizData.length) {
                showResults();
                return;
            }

            const currentQuestion = quizData[currentQuestionIndex];
            
            // Actualitzar textos
            questionNumberElem.innerText = `Pregunta ${currentQuestionIndex + 1} de ${quizData.length}`;
            questionTextElem.innerText = `${currentQuestion.id}. ${currentQuestion.question}`;
            scoreCounterElem.innerText = `Puntuació: ${score} pts`;
            
            // Progress bar
            const progressPercent = (currentQuestionIndex / quizData.length) * 100;
            progressBarElem.style.width = `${progressPercent}%`;

            // Netejar opcions anteriors
            optionsContainerElem.innerHTML = '';

            // Generar botons d'opcions
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option;
                button.onclick = () => checkAnswer(index);
                optionsContainerElem.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex) {
            const currentQuestion = quizData[currentQuestionIndex];
            const buttons = optionsContainerElem.getElementsByClassName('option-btn');
            
            // Deshabilitar tots els botons per evitar múltiples clics
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
            }

            const isCorrect = selectedIndex === currentQuestion.correct;

            // Aplicar colors als botons en segon pla
            buttons[currentQuestion.correct].classList.add('correct');
            if (!isCorrect) {
                buttons[selectedIndex].classList.add('wrong');
            }

            // Configurar el popup/modal de feedback immediat segons condicions de l'usuari
            if (isCorrect) {
                score++;
                scoreCounterElem.innerText = `Puntuació: ${score} pts`;
                
                feedbackCard.className = "feedback-card success";
                feedbackVisual.innerHTML = applauseSVG;
                feedbackTitle.innerText = "¡MOLT BÉ! ¡CORRECTE! 🌟";
                feedbackStatusText.innerText = "Heu sumat un punt per a la vostra classe.";
            } else {
                feedbackCard.className = "feedback-card fail";
                feedbackVisual.innerHTML = cryEmojiHTML;
                feedbackTitle.innerText = "¡OOOOOHHHHH! 😭";
                feedbackStatusText.innerText = "¡Resposta incorrecta!";
            }

            feedbackExplanation.innerText = currentQuestion.explanation;
            
            // Mostrar l'overlay de feedback
            setTimeout(() => {
                feedbackOverlay.style.display = 'flex';
            }, 300);
        }

        function closeFeedback() {
            feedbackOverlay.style.display = 'none';
            currentQuestionIndex++;
            loadQuestion();
        }

        function showResults() {
            gameViewElem.style.display = 'none';
            resultsViewElem.style.display = 'block';
            progressBarElem.style.width = '100%';
            finalScoreElem.innerText = `${score} / ${quizData.length}`;

            let rankingMsg = "";
            const ratio = score / quizData.length;

            if (ratio >= 0.9) {
                rankingMsg = "🥇 NIVELL ABSOLUT EXCELLENT! Sou autèntics líders digitals crítics. Les xarxes i la seguretat no tenen secrets per a vosaltres! Copa de campions de classe! 🏆";
            } else if (ratio >= 0.7) {
                rankingMsg = "🥈 EXCEL·LENT NIVELL! Teniu un criteri fantàstic sobre l'economia de l'atenció i la protecció de dades. Molt bona feina d'equip! 🚀";
            } else if (ratio >= 0.5) {
                rankingMsg = "🥉 BÉ, PERÒ CAL ALERTA! Heu aprovat el test difícil, però vigileu amb l'empremta digital i els paranys dels algoritmes. Repasseu el dossier! 📈";
            } else {
                rankingMsg = "📉 ALERTA DE RISC DIGITAL! L'algoritme de l'economia de l'atenció us està guanyant la partida. Cal que estigueu més atents als senyals de phishing i el benestar digital! 📋";
            }

            rankingMessageElem.innerText = rankingMsg;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            resultsViewElem.style.display = 'none';
            gameViewElem.style.display = 'block';
            loadQuestion();
        }

        // Iniciar el joc en obrir la pàgina
        window.onload = loadQuestion;
    </script>
